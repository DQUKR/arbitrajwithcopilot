name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [ '3.8', '3.9', '3.10', '3.11' ]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax
      run: |
        python -m py_compile config.py
        python -m py_compile data_fetcher.py
        python -m py_compile data_manager.py
        python -m py_compile commission_calculator.py
        python -m py_compile price_analyzer.py
        python -m py_compile app.py
    
    - name: Test imports
      run: |
        python -c "import streamlit; import pandas; import requests; print('All imports successful')"
